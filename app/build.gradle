name: Android Cloud Build Pipeline

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v5          # ← เปลี่ยนเป็น v5 (แนะนำมาก)
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: gradle                      # ← เพิ่ม cache เพื่อเร็วขึ้น

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    - name: Clean
      run: ./gradlew clean

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Generate Timestamp
      id: timestamp
      run: echo "timestamp=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

    - name: Upload APK to Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "build-${{ steps.timestamp.outputs.timestamp }}"
        name: "Build ${{ steps.timestamp.outputs.timestamp }}"
        draft: false
        prerelease: false
        make_latest: true
        overwrite_files: true
        files: app/build/outputs/apk/debug/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
